<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scorpio Stream Meter</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 30px; }
        #urlInput { width: 450px; padding: 8px; }
        button { padding: 8px 16px; margin: 10px; }
        #status { margin: 10px; color: #666; }

        /* LED meter container */
        #meterContainer {
            display: flex;
            justify-content: center;
            margin: 20px auto;
            gap: 4px;
            background: #222;
            padding: 10px;
            border-radius: 8px;
            width: fit-content;
        }
        .led {
            width: 30px;
            height: 50px;
            background-color: #333;
            border-radius: 4px;
            transition: background-color 0.05s ease;
        }
        .led.green.on { background-color: #0f0; }
        .led.yellow.on { background-color: #ff0; }
        .led.red.on { background-color: #f00; }

        /* Peak indicator */
        #peakContainer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px;
        }
        #peakLed {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #333;
        }
        #peakLed.active { background-color: #f00; }
        #peakValue {
            font-size: 20px;
            font-weight: bold;
            min-width: 80px;
        }

        #dbValue { font-size: 24px; margin: 10px; }
        #clipIndicator {
            display: inline-block;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: gray;
            line-height: 60px;
            color: white;
            font-weight: bold;
            margin-top: 10px;
        }
        #clipIndicator.active { background: red; }
    </style>
</head>
<body>
    <h1>Scorpio Stream Meter</h1>
    <button id="connectBtn">Connect</button>
    <div id="status">Click Connect</div>

    <!-- LED meter -->
    <div id="meterContainer"></div>

    <!-- Peak display -->
    <div id="peakContainer">
        <span>Peak:</span>
        <div id="peakLed"></div>
        <span id="peakValue">-∞ dB</span>
    </div>

    <div id="clipIndicator">CLIP</div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const connectBtn = document.getElementById('connectBtn');
        const meterContainer = document.getElementById('meterContainer');
        const peakLed = document.getElementById('peakLed');
        const peakValue = document.getElementById('peakValue');
        const clipIndicator = document.getElementById('clipIndicator');
        const status = document.getElementById('status');

        // Create 12 LEDs
        const LED_COUNT = 12;
        for (let i = 0; i < LED_COUNT; i++) {
            const led = document.createElement('div');
            led.className = 'led';
            if (i < 7) led.classList.add('green');
            else if (i < 10) led.classList.add('yellow');
            else led.classList.add('red');
            meterContainer.appendChild(led);
        }
        const leds = document.querySelectorAll('.led');

        let audioContext = null;
        let audioElement = null;
        let source = null;          // original MediaElementAudioSourceNode
        let streamSource = null;     // optional MediaStreamAudioSourceNode from captureStream
        let analyser = null;
        let animationFrame = null;
        let isClipping = false;

        // Peak hold variables
        let peakDb = -100;
        let peakTimeout = null;
        const PEAK_HOLD_MS = 1000;
        const CLIP_THRESHOLD = 0.98;

        function dbToLedCount(db) {
            if (db <= -30) return 0;
            if (db >= 0) return LED_COUNT;
            return Math.floor((db + 30) / 30 * LED_COUNT);
        }

        function updateLEDs(db) {
            const litCount = dbToLedCount(db);
            for (let i = 0; i < LED_COUNT; i++) {
                if (i < litCount) {
                    leds[i].classList.add('on');
                } else {
                    leds[i].classList.remove('on');
                }
            }
        }

        function updatePeak(currentDb) {
            if (currentDb > peakDb) {
                peakDb = currentDb;
                peakLed.classList.add('active');
                peakValue.textContent = peakDb.toFixed(1) + ' dB';

                if (peakTimeout) clearTimeout(peakTimeout);
                peakTimeout = setTimeout(() => {
                    peakDb = -100;
                    peakValue.textContent = '-∞ dB';
                    peakLed.classList.remove('active');
                    peakTimeout = null;
                }, PEAK_HOLD_MS);
            }
        }

        function stopStream() {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            if (audioElement) {
                audioElement.pause();
                audioElement.src = '';
                audioElement = null;
            }
            if (source) {
                source.disconnect();
                source = null;
            }
            if (streamSource) {
                streamSource.disconnect();
                streamSource = null;
            }
            if (analyser) {
                analyser.disconnect();
                analyser = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            if (peakTimeout) {
                clearTimeout(peakTimeout);
                peakTimeout = null;
            }
            updateLEDs(-100);
            peakDb = -100;
            peakValue.textContent = '-∞ dB';
            peakLed.classList.remove('active');
            clipIndicator.classList.remove('active');
            isClipping = false;
            status.textContent = 'Please wait for connection';
        }

        connectBtn.addEventListener('click', async () => {
            stopStream();

            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                await audioContext.resume();

                audioElement = new Audio();
                audioElement.crossOrigin = 'anonymous';
                audioElement.src = 'https://stream.radioscorpio.be/stream';
                // audioElement.src = 'kevin_MacLeod-Slow_Burn.mp3'; // for testing
                audioElement.loop = false;

                source = audioContext.createMediaElementSource(audioElement);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);

                // Initially connect the original source (will be replaced if captureStream works)
                source.connect(analyser);
                analyser.connect(audioContext.destination);

                audioElement.onerror = (e) => {
                    const errorMsg = audioElement.error ? audioElement.error.message : 'CORS or network error';
                    status.textContent = `Error: ${errorMsg}`;
                    stopStream();
                };

                await audioElement.play();

                // Use the 'playing' event to ensure the stream is actually active
                const onPlaying = () => {
                    audioElement.removeEventListener('playing', onPlaying);

                    // Try captureStream() if available (Safari)
                    if (audioElement.captureStream) {
                        try {
                            const stream = audioElement.captureStream();
                            if (stream.getAudioTracks().length > 0) {
                                // Disconnect the original source
                                if (source) source.disconnect();
                                // Create and connect the new stream source
                                streamSource = audioContext.createMediaStreamSource(stream);
                                streamSource.connect(analyser);
                                status.textContent = 'Connected – streaming (captureStream)';
                            } else {
                                throw new Error('No audio tracks');
                            }
                        } catch (e) {
                            console.warn('captureStream failed, using original source', e);
                            status.textContent = 'Connected – streaming (original)';
                        }
                    } else {
                        status.textContent = 'Connected – streaming';
                    }

                    // Start the meter
                    updateMeter();
                };

                audioElement.addEventListener('playing', onPlaying);

                // In case the 'playing' event already fired before we set the listener,
                // check the current state.
                if (!audioElement.paused && audioElement.readyState >= 3) { // HAVE_FUTURE_DATA or more
                    onPlaying();
                }

                // The meter update function (unchanged)
                function updateMeter() {
                    if (!analyser || !audioElement || audioElement.paused) return;

                    analyser.getByteTimeDomainData(dataArray);

                    let sumSquares = 0;
                    let peak = 0;
                    for (let i = 0; i < bufferLength; i++) {
                        const floatSample = (dataArray[i] - 128) / 128;
                        sumSquares += floatSample * floatSample;
                        const absSample = Math.abs(floatSample);
                        if (absSample > peak) peak = absSample;
                    }
                    const rms = Math.sqrt(sumSquares / bufferLength);

                    let db = -100;
                    if (rms > 0) {
                        db = 20 * Math.log10(rms);
                    }
                    db = Math.max(-100, Math.min(0, db));

                    updateLEDs(db);
                    updatePeak(db);

                    const clippingNow = peak > CLIP_THRESHOLD;
                    if (clippingNow && !isClipping) {
                        console.log(peak);
                        clipIndicator.classList.add('active');
                        isClipping = true;
                    } else if (!clippingNow && isClipping) {
                        clipIndicator.classList.remove('active');
                        isClipping = false;
                    }

                    animationFrame = requestAnimationFrame(updateMeter);
                }

            } catch (err) {
                status.textContent = `Failed: ${err.message}`;
                stopStream();
            }
        });

        window.addEventListener('beforeunload', stopStream);
    </script>
</body>
</html>
